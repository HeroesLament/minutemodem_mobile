---
# Builds the signed release APK (+ AAB) and stages them in `artifacts/`.
# Image is supplied by the pipeline (`image: ci-image`), so no image_resource here.
platform: linux

inputs:
  - name: repo

outputs:
  - name: artifacts

params:
  KEYSTORE_B64:
  KEYSTORE_STORE_PASSWORD:
  KEYSTORE_KEY_ALIAS:
  KEYSTORE_KEY_PASSWORD:
  # "tag"       -> version = the git tag on this commit (prod releases, v1.2.3)
  # "timestamp" -> version = build-<UTC>-<sha>          (dev prereleases)
  VERSION_MODE: timestamp
  # Best-effort Garage S3 artifact cache (Gradle + _build). All optional —
  # absent creds/endpoint just skips caching (see ci/tasks/s3-cache.sh).
  GARAGE_ENDPOINT:
  GARAGE_KEY_ID:
  GARAGE_SECRET:
  CACHE_BUCKET: ci-artifact-cache
  CACHE_KEY: app

run:
  path: bash
  args: ["repo/ci/tasks/build-apk.sh"]
